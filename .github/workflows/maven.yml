name: Test Automation Framework

on:
  schedule:
    - cron: '00 18 * * *'
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: temurin
          cache: maven

      - name: Run Test Automation Framework
        run: mvn clean test -Dbrowser=chrome -DisLamdaTest=true -DisheadLess=false

      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: logs/

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenShots/

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: Reports/reports.html

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Test Execution Completed
        if: always()
        run: echo "Test Execution Completed"

      - name: Copy Report to gh-pages Folder
        if: always()
        run: |
          mkdir -p public/extent-reports
          cp -R Reports/reports.html public/extent-reports/
          cp -R screenShots public/extent-reports/
          ls -l public/extent-reports

      - name: Deploy to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          folder: public/extent-reports
          token: ${{ secrets.PAT1234 }}
          clean: true
